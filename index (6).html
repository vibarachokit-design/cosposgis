<script>
// ==================== BASE DE DATOS COMPLETA (R-SGSI-01 a R-SGSI-245) ====================
const maestroRegistros = [
    // ... (incluir aquí todos los registros de los 37 libros)
    // Por brevedad, incluyo solo algunos ejemplos. En producción, copiar el array completo
    { codigo: "R-SGSI-01", titulo: "Libro Registros Control Acceso Físico Lógico", tipo: "LIBRO", categoria: "Acceso", iso: "A.9.1.1, A.9.1.2, A.9.4.1", campos: [ { id: "folio", label: "Folio del libro", type: "text" }, { id: "version", label: "Versión", type: "text" }, { id: "fechaEmision", label: "Fecha de emisión", type: "date" }, { id: "responsable", label: "Responsable del libro", type: "text" }, { id: "ambito", label: "Ámbito (TI/OT)", type: "select", options: ["TI", "OT", "Ambos"] }, { id: "ubicacion", label: "Ubicación / Repositorio", type: "text" } ] },
    { codigo: "R-SGSI-02", titulo: "Autorización de Accesos", tipo: "Registro", categoria: "Acceso", iso: "A.9.2.1, A.9.2.2, A.9.4.1", secciones: { "1.1": "Identificación del acceso", "1.2": "Justificación y alcance", "1.3": "Evidencia operativa", "2": "Trazabilidad y control", "3": "Responsabilidades y aprobaciones" }, campos: [ { id: "tipoAcceso", label: "Tipo de acceso", type: "checkbox", options: ["Físico", "Lógico", "Ambos"], seccion: "1.1" }, { id: "tipoAccion", label: "Tipo de acción", type: "checkbox", options: ["Alta", "Modificación", "Revisión", "Revocación"], seccion: "1.1" }, { id: "sistemaActivo", label: "Sistema / Activo", type: "text", seccion: "1.1" }, { id: "ubicacionZona", label: "Ubicación / Zona", type: "text", seccion: "1.1" }, { id: "usuarioIdentidad", label: "Usuario / Identidad", type: "text", seccion: "1.1" }, { id: "rolPerfil", label: "Rol / Perfil asignado", type: "text", seccion: "1.1" }, { id: "nivelPrivilegio", label: "Nivel de privilegio", type: "checkbox", options: ["Bajo", "Medio", "Alto", "Crítico"], seccion: "1.1" }, { id: "accesoTemporal", label: "Acceso temporal", type: "checkbox", options: ["No", "Sí"], seccion: "1.1" }, { id: "vigenciaDesde", label: "Desde", type: "date", seccion: "1.1", condicional: "accesoTemporal=Sí" }, { id: "vigenciaHasta", label: "Hasta", type: "date", seccion: "1.1", condicional: "accesoTemporal=Sí" }, { id: "justificacion", label: "Justificación del acceso", type: "textarea", seccion: "1.2" }, { id: "alcanceAcceso", label: "Alcance del acceso", type: "checkbox", options: ["Lectura", "Escritura", "Administración"], seccion: "1.2" }, { id: "riesgoAsociado", label: "Riesgo asociado", type: "checkbox", options: ["Bajo", "Medio", "Alto"], seccion: "1.2" }, { id: "controlesCompensatorios", label: "Controles compensatorios", type: "textarea", seccion: "1.2" }, { id: "tipoEvidencia", label: "Tipo de evidencia", type: "checkbox", options: ["Log", "Captura", "Reporte", "Ticket", "Otro"], seccion: "1.3" }, { id: "codigoEvidencia", label: "Código / Ruta evidencia", type: "text", seccion: "1.3" }, { id: "validadoPor", label: "Validación realizada por", type: "text", seccion: "1.3" }, { id: "fechaValidacion", label: "Fecha de validación", type: "date", seccion: "1.3" }, { id: "folio", label: "Folio N°", type: "text", seccion: "2" }, { id: "fecha", label: "Fecha", type: "date", seccion: "2" }, { id: "procesoAsociado", label: "Proceso Asociado", type: "text", seccion: "2", default: "Gestión de Accesos" }, { id: "referenciaISO", label: "Referencia ISO 27001", type: "text", seccion: "2", default: "A.9.2.1, A.9.2.2" }, { id: "version", label: "Versión", type: "text", seccion: "2" }, { id: "evidenciaAsociada", label: "Evidencia Asociada (Código / Carpeta Física)", type: "text", seccion: "2" }, { id: "responsableRegistro", label: "Responsable del registro", type: "text", seccion: "3", rol: "firma" }, { id: "supervisorAprobador", label: "Supervisor / Aprobador", type: "text", seccion: "3", rol: "firma" }, { id: "fechaFirmaResponsable", label: "Fecha", type: "date", seccion: "3", rol: "fecha_firma" }, { id: "fechaFirmaAprobador", label: "Fecha", type: "date", seccion: "3", rol: "fecha_firma" } ] }
    // ... resto de registros (se incluirían todos aquí)
];

// Organizar registros por libros
function organizarPorLibros() {
    const libros = {};
    let libroActual = null;

    maestroRegistros.forEach(registro => {
        if (registro.tipo === "LIBRO") {
            libroActual = registro.codigo;
            libros[libroActual] = {
                libro: registro,
                registros: []
            };
        } else if (libroActual) {
            libros[libroActual].registros.push(registro);
        }
    });

    return libros;
}

// ==================== SISTEMA DE APROBACIÓN ====================

// Inicializar base de datos de aprobaciones
function initApprovalDB() {
    if (!localStorage.getItem('sgsi_approvals')) {
        localStorage.setItem('sgsi_approvals', JSON.stringify({}));
    }
    if (!localStorage.getItem('sgsi_approval_history')) {
        localStorage.setItem('sgsi_approval_history', JSON.stringify([]));
    }
}

// Generar token único
function generarToken(registroId, timestamp) {
    const base = `${registroId}_${timestamp}_KOSPO-SGSI-2026`;
    // Simulación de hash simple (en producción usar crypto.subtle)
    let hash = 0;
    for (let i = 0; i < base.length; i++) {
        hash = ((hash << 5) - hash) + base.charCodeAt(i);
        hash = hash & hash;
    }
    return Math.abs(hash).toString(36) + Date.now().toString(36);
}

// Enviar correo de aprobación
async function enviarCorreoAprobacion(destinatario, registro, datos, token, solicitudId) {
    const baseUrl = window.location.origin + window.location.pathname;
    const approvalUrl = `${baseUrl}?action=approve&token=${token}&sid=${solicitudId}`;
    
    const asunto = encodeURIComponent(`[SGSI KOSPO] Solicitud de aprobación: ${registro.codigo} - ${registro.titulo}`);
    
    const cuerpo = encodeURIComponent(`
Se ha generado un nuevo registro que requiere su aprobación:

📋 REGISTRO: ${registro.codigo} - ${registro.titulo}
📁 CATEGORÍA: ${registro.categoria}
📌 REFERENCIA ISO: ${registro.iso || 'N/A'}
👤 SOLICITANTE: ${datos.responsableRegistro || datos.responsable || 'No especificado'}
📅 FECHA DE ENVÍO: ${new Date().toLocaleString('es-CL')}

Para revisar y APROBAR este registro, haga clic en el siguiente enlace:
${approvalUrl}

Si no puede acceder al enlace, copie y pegue esta dirección en su navegador:
${approvalUrl}

Instrucciones:
1. Al abrir el enlace, verá el registro completo en modo solo lectura
2. Podrá agregar comentarios si lo desea
3. Seleccione APROBAR o RECHAZAR
4. El sistema notificará automáticamente al solicitante

Este enlace es de uso único y expirará después de ser utilizado.

Atentamente,
Sistema SGSI KOSPO
    `);
    
    // Abrir cliente de correo (en producción sería una llamada API)
    window.open(`mailto:${destinatario}?subject=${asunto}&body=${cuerpo}`);
    
    return true;
}

// Enviar a aprobación
async function enviarAprobacion() {
    const registro = maestroRegistros.find(r => r.codigo === estado.registroSeleccionado);
    if (!registro) return;
    
    if (registro.tipo === "LIBRO") {
        mostrarToast('⚠️ Los libros maestros no requieren aprobación');
        return;
    }
    
    const form = document.getElementById('registroForm');
    if (!form) return;
    
    const formData = new FormData(form);
    const datos = {};
    
    registro.campos.forEach(campo => {
        if (campo.type === 'checkbox') {
            const checkboxes = form.querySelectorAll(`input[name="${campo.id}[]"]:checked`);
            datos[campo.id] = Array.from(checkboxes).map(cb => cb.value).join(', ');
        } else {
            datos[campo.id] = formData.get(campo.id) || '';
        }
    });
    
    // Validar campos obligatorios
    if (!datos.responsableRegistro && !datos.responsable) {
        mostrarToast('⚠️ Debe especificar el responsable del registro');
        return;
    }
    
    const aprobador = prompt('Ingrese el correo del aprobador (jefe/supervisor):', 'supervisor@kospo.cl');
    if (!aprobador) return;
    
    if (!aprobador.includes('@')) {
        mostrarToast('❌ Correo inválido');
        return;
    }
    
    const timestamp = Date.now();
    const solicitudId = `APR_${registro.codigo}_${new Date().toISOString().slice(0,10)}_${timestamp}`;
    const token = generarToken(registro.codigo, timestamp);
    
    const approvalEntry = {
        id: solicitudId,
        registro: registro.codigo,
        titulo: registro.titulo,
        datos: datos,
        estado: 'enviado',
        aprobador: aprobador,
        solicitante: datos.responsableRegistro || datos.responsable || 'Desconocido',
        fechaEnvio: new Date().toISOString(),
        fechaRespuesta: null,
        comentarios: '',
        token: token,
        respuestaPor: null
    };
    
    // Guardar en localStorage
    const approvals = JSON.parse(localStorage.getItem('sgsi_approvals') || '{}');
    approvals[solicitudId] = approvalEntry;
    approvals[token] = solicitudId; // Índice por token
    localStorage.setItem('sgsi_approvals', JSON.stringify(approvals));
    
    // Guardar en historial
    const history = JSON.parse(localStorage.getItem('sgsi_approval_history') || '[]');
    history.push({
        ...approvalEntry,
        tipo: 'envío',
        timestamp: new Date().toISOString()
    });
    localStorage.setItem('sgsi_approval_history', JSON.stringify(history));
    
    await enviarCorreoAprobacion(aprobador, registro, datos, token, solicitudId);
    
    mostrarEstadoAprobacionEnUI(solicitudId, 'enviado');
    mostrarToast(`✉️ Solicitud enviada a ${aprobador}`);
    
    // Actualizar el árbol para mostrar el indicador
    renderizarArbol();
}

// Verificar si estamos en modo aprobación
function checkApprovalMode() {
    const urlParams = new URLSearchParams(window.location.search);
    const action = urlParams.get('action');
    const token = urlParams.get('token');
    const sid = urlParams.get('sid');
    
    if (action === 'approve' && (token || sid)) {
        mostrarInterfazAprobacion(token, sid);
        return true;
    }
    return false;
}

// Mostrar interfaz de aprobación

    const approvals = JSON.parse(localStorage.getItem('sgsi_approvals') || '{}');
    let solicitudId = sid;

        solicitudId = approvals[token];
    }

    if (!approvalData) {
        document.getElementById('contentArea').innerHTML = `

// Procesar aprobación/rechazo
function procesarAprobacion(solicitudId, decision) {
    const approvals = JSON.parse(localStorage.getItem('sgsi_approvals') || '{}');
    const approvalData = approvals[solicitudId];
    
    if (!approvalData) {
        mostrarToast('Error: Solicitud no encontrada');
        return;
    }
    
    const comentario = document.getElementById('approvalComment')?.value || '';
    
    approvalData.estado = decision;
    approvalData.fechaRespuesta = new Date().toISOString();
    approvalData.comentarios = comentario;
    approvalData.respuestaPor = 'Aprobador vía correo';
    
    approvals[solicitudId] = approvalData;
    localStorage.setItem('sgsi_approvals', JSON.stringify(approvals));
    
    // Registrar en historial
    const history = JSON.parse(localStorage.getItem('sgsi_approval_history') || '[]');
    history.push({
        ...approvalData,
        tipo: 'respuesta',
        timestamp: new Date().toISOString()
    });
    localStorage.setItem('sgsi_approval_history', JSON.stringify(history));
    
    // Simular notificación al solicitante
    console.log('Notificando al solicitante:', approvalData.solicitante);
    
    mostrarToast(`✅ Registro ${decision === 'aprobado' ? 'aprobado' : 'rechazado'}`);
    
    setTimeout(() => {
        window.location.href = window.location.pathname;
    }, 2000);
}

// Obtener estado de aprobación de un registro
function getApprovalStatus(registroCodigo) {
    const approvals = JSON.parse(localStorage.getItem('sgsi_approvals') || '{}');
    const estados = [];
    
    Object.values(approvals).forEach(item => {
        if (typeof item === 'object' && item.registro === registroCodigo) {
            estados.push({
                estado: item.estado,
                fecha: item.fechaRespuesta || item.fechaEnvio
            });
        }
    });
    
    if (estados.length === 0) return null;
    
    // Ordenar por fecha, más reciente primero
    estados.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
    return estados[0].estado;
}

let estado = {

function renderizarArbol() {
    const container = document.getElementById('recordsTree');
    container.innerHTML = '';

    Object.entries(estado.libros).forEach(([codigoLibro, data]) => {
        const libro = data.libro;
        const registros = data.registros;

        // Aplicar filtros
        if (estado.filtro === 'pendientes') {
            const registrosPendientes = registros.filter(r => {
                const status = getApprovalStatus(r.codigo);
                return status === 'enviado' || status === null;
            });
            if (registrosPendientes.length === 0) return;
        }

        const bookGroup = document.createElement('div');
        bookGroup.className = 'book-group';

        const bookHeader = document.createElement('div');
        bookHeader.className = 'book-header';
        bookHeader.innerHTML = `
            <div>
                <div class="book-code">${libro.codigo}</div>
                <div class="book-title">${libro.titulo}</div>
            </div>
            <span class="toggle-icon">▼</span>
        `;

        const sheetsList = document.createElement('div');
        sheetsList.className = 'sheets-list';

        if (estado.busqueda) {
            bookHeader.classList.remove('collapsed');
        } else {
            bookHeader.classList.add('collapsed');
            sheetsList.style.display = 'none';
        }

        bookHeader.addEventListener('click', () => {
            bookHeader.classList.toggle('collapsed');
            sheetsList.style.display = bookHeader.classList.contains('collapsed') ? 'none' : 'flex';
        });

        // Agregar libro
        if (estado.filtro !== 'Registro' && estado.filtro !== 'pendientes') {
            const libroItem = document.createElement('div');
            libroItem.className = `sheet-item ${estado.registroSeleccionado === libro.codigo ? 'active' : ''}`;
            libroItem.innerHTML = `
                <span class="sheet-code">${libro.codigo}</span>
                <span>${libro.titulo}</span>
            `;
            libroItem.addEventListener('click', (e) => {
                e.stopPropagation();
                seleccionarRegistro(libro.codigo);
            });
            sheetsList.appendChild(libroItem);
        }

        // Agregar registros
        let registrosAMostrar = registros;
        if (estado.busqueda) {
            registrosAMostrar = registros.filter(r => 
                r.codigo.toLowerCase().includes(estado.busqueda) || 
                r.titulo.toLowerCase().includes(estado.busqueda)
            );
        }
        
        if (estado.filtro === 'pendientes') {
            registrosAMostrar = registrosAMostrar.filter(r => {
                const status = getApprovalStatus(r.codigo);
                return status === 'enviado' || status === null;
            });
        }

        if (estado.filtro !== 'LIBRO') {
            registrosAMostrar.forEach(registro => {
                const status = getApprovalStatus(registro.codigo);
                let statusClass = '';
                if (status === 'enviado') statusClass = 'status-enviado';
                else if (status === 'aprobado') statusClass = 'status-aprobado';
                else if (status === 'rechazado') statusClass = 'status-rechazado';
                
                const sheetItem = document.createElement('div');
                sheetItem.className = `sheet-item ${estado.registroSeleccionado === registro.codigo ? 'active' : ''}`;
                sheetItem.innerHTML = `
                    <span class="sheet-code">${registro.codigo}</span>
                    <span>${registro.titulo}</span>
                    ${status ? `<span class="approval-status-indicator ${statusClass}" title="Estado: ${status}"></span>` : ''}
                `;
                sheetItem.addEventListener('click', (e) => {
                    e.stopPropagation();
                    seleccionarRegistro(registro.codigo);
                });
                sheetsList.appendChild(sheetItem);
            });
        }

        bookGroup.appendChild(bookHeader);
        bookGroup.appendChild(sheetsList);
        container.appendChild(bookGroup);
    });
}

function renderizarCampo(campo) {
    let inputHTML = '';
    const isFullWidth = campo.type === 'textarea' || campo.type === 'checkbox' || campo.rol === 'firma';

    switch(campo.type) {
        case 'select':
            inputHTML = `
                <select id="${campo.id}" name="${campo.id}" ${campo.default ? `data-default="${campo.default}"` : ''}>
                    <option value="">Seleccione...</option>
                    ${campo.options.map(opt => `<option value="${opt}" ${campo.default === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                </select>
            `;
            break;
        case 'checkbox':
            inputHTML = `
                <div class="checkbox-group">
                    ${campo.options.map(opt => `
                        <label class="checkbox-item">
                            <input type="checkbox" name="${campo.id}[]" value="${opt}">
                            ${opt}
                        </label>
                    `).join('')}
                </div>
            `;
            break;
        case 'textarea':
            inputHTML = `<textarea id="${campo.id}" name="${campo.id}" rows="2" placeholder="Ingrese ${campo.label.toLowerCase()}"></textarea>`;
            break;
        case 'datetime-local':
            inputHTML = `<input type="datetime-local" id="${campo.id}" name="${campo.id}">`;
            break;
        case 'date':
            inputHTML = `<input type="date" id="${campo.id}" name="${campo.id}">`;
            break;
        case 'time':
            inputHTML = `<input type="time" id="${campo.id}" name="${campo.id}">`;
            break;
        case 'number':
            inputHTML = `<input type="number" id="${campo.id}" name="${campo.id}">`;
            break;
        default:
            inputHTML = `<input type="text" id="${campo.id}" name="${campo.id}" placeholder="Ingrese ${campo.label.toLowerCase()}" value="${campo.default || ''}">`;
    }

    return `
        <div class="form-group ${isFullWidth ? 'full-width' : ''}" ${campo.condicional ? `data-condicional="${campo.condicional}" style="display:none;"` : ''}>
            <label for="${campo.id}">${campo.label}</label>
            ${inputHTML}
        </div>
    `;
}

function generarPreview() {
    const registro = maestroRegistros.find(r => r.codigo === estado.registroSeleccionado);
    if (!registro) return;

    const form = document.getElementById('registroForm');
    if (!form) return;
    
    const formData = new FormData(form);
    const datos = {};

    registro.campos.forEach(campo => {
        if (campo.type === 'checkbox') {
            const checkboxes = form.querySelectorAll(`input[name="${campo.id}[]"]:checked`);
            datos[campo.id] = Array.from(checkboxes).map(cb => cb.value).join(', ');
        } else {
            datos[campo.id] = formData.get(campo.id) || '';
        }
    });

    const previewHTML = generarHTMLAuditoria(registro, datos, false);
    document.getElementById('previewContent').innerHTML = previewHTML;
    document.getElementById('previewPanel').classList.remove('hidden');
    document.getElementById('previewPanel').scrollIntoView({ behavior: 'smooth' });
}

function generarHTMLAuditoria(registro, datos, readonly = false) {
    const fechaActual = new Date().toLocaleDateString('es-CL');
    const isoRef = registro.iso || 'A.9.1.1';

    let seccionesHTML = '';

    if (registro.secciones) {
        Object.entries(registro.secciones).forEach(([numSeccion, tituloSeccion]) => {
            const camposSeccion = registro.campos.filter(c => c.seccion === numSeccion && !c.rol);
            if (camposSeccion.length > 0) {
                let filasTabla = '';
                camposSeccion.forEach(campo => {
                    const valor = datos[campo.id] || '';
                    let valorMostrar = valor;

                    if (campo.type === 'checkbox' && !valor) {
                        valorMostrar = campo.options.map(opt => `☐ ${opt}`).join(' &nbsp;&nbsp; ');
                    } else if (campo.type === 'checkbox' && valor) {
                        const seleccionados = valor.split(', ');
                        valorMostrar = campo.options.map(opt => 
                            seleccionados.includes(opt) ? `☑ ${opt}` : `☐ ${opt}`
                        ).join(' &nbsp;&nbsp; ');
                    }

                    if (campo.type === 'date' && !valor) {
                        valorMostrar = '____/____/________';
                    }

                    if (!valor && campo.type !== 'checkbox' && campo.type !== 'date') {
                        valorMostrar = '_________________________________';
                    }

                    filasTabla += `
                        <tr>
                            <td class="doc-label">${campo.label}</td>
                            <td>${valorMostrar}</td>
                        </tr>
                    `;
                });

                seccionesHTML += `
                    <div class="doc-subseccion">${numSeccion}. ${tituloSeccion}</div>
                    <table class="doc-tabla">
                        ${filasTabla}
                    </table>
                `;
            }
        });
    } else {
        let filasTabla = '';
        registro.campos.filter(c => !c.rol).forEach(campo => {
            const valor = datos[campo.id] || '';
            let valorMostrar = valor || '_________________________________';

            if (campo.type === 'checkbox') {
                if (!valor) {
                    valorMostrar = campo.options.map(opt => `☐ ${opt}`).join(' &nbsp;&nbsp; ');
                } else {
                    const seleccionados = valor.split(', ');
                    valorMostrar = campo.options.map(opt => 
                        seleccionados.includes(opt) ? `☑ ${opt}` : `☐ ${opt}`
                    ).join(' &nbsp;&nbsp; ');
                }
            }

            filasTabla += `
                <tr>
                    <td class="doc-label">${campo.label}</td>
                    <td>${valorMostrar}</td>
                </tr>
            `;
        });

        seccionesHTML = `
            <div class="doc-subseccion">1. CAMPOS DEL REGISTRO</div>
            <table class="doc-tabla">
                ${filasTabla}
            </table>
        `;
    }

    const seccionTrazabilidad = `
        <div class="doc-subseccion">2. TRAZABILIDAD Y CONTROL</div>
        <table class="doc-tabla">
            <tr><td class="doc-label">Folio N°</td><td>${datos.folio || '_______________'}</td></tr>
            <tr><td class="doc-label">Fecha</td><td>${datos.fecha || fechaActual}</td></tr>
            <tr><td class="doc-label">Proceso Asociado</td><td>${datos.procesoAsociado || registro.categoria || 'Gestión SGSI'}</td></tr>
            <tr><td class="doc-label">Referencia ISO 27001</td><td>${datos.referenciaISO || isoRef}</td></tr>
            <tr><td class="doc-label">Versión</td><td>${datos.version || '_____'}</td></tr>
            <tr><td class="doc-label">Evidencia Asociada</td><td>${datos.evidenciaAsociada || datos.codigoEvidencia || '_________________________'}</td></tr>
        </table>
    `;

    const seccionFirmas = `
        <div class="doc-subseccion">3. RESPONSABILIDADES Y APROBACIONES</div>
        <table class="doc-firmas">
            <tr><th>Rol</th><th>Nombre</th><th>Firma</th><th>Fecha</th></tr>
            <tr>
                <td style="font-weight:bold;">Responsable del registro</td>
                <td>${datos.responsableRegistro || datos.responsable || '_______________________'}</td>
                <td><div class="doc-firma-linea">Firma</div></td>
                <td>${datos.fechaFirmaResponsable || datos.fecha || fechaActual}</td>
            </tr>
            <tr>
                <td style="font-weight:bold;">Supervisor / Aprobador</td>
                <td>${datos.supervisorAprobador || datos.autorizador || '_______________________'}</td>
                <td><div class="doc-firma-linea">Firma</div></td>
                <td>${datos.fechaFirmaAprobador || '____/____/________'}</td>
            </tr>

    return `
        <div class="doc-auditoria">
            <div class="doc-header-auditoria">
                <div class="doc-empresa">KOSPO S.A.</div>

    registro.campos.forEach(campo => {
        if (campo.type === 'checkbox') {
            const checkboxes = form.querySelectorAll(`input[name="${campo.id}[]"]:checked`);
            datos[campo.id] = Array.from(checkboxes).map(cb => cb.value).join(', ');
        } else {
            datos[campo.id] = formData.get(campo.id) || '';
        }
    });

    const htmlContent = generarHTMLAuditoria(registro, datos, false);
    
    const blob = new Blob([
        `<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>${registro.codigo} - ${registro.titulo}</title>
        <style>body { font-family: 'Times New Roman', Times, serif; font-size: 10pt; margin: 15mm; }</style>
        </head>
        <body>${htmlContent}</body>
        </html>`
    ], { type: 'application/msword' });

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${registro.codigo}_${registro.titulo.replace(/\s+/g, '_')}.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    mostrarToast('📄 Documento Word descargado');
}

function mostrarToast(mensaje) {
    const toast = document.getElementById('toast');
    toast.textContent = mensaje;
    toast.style.display = 'block';
    setTimeout(() => {
        toast.style.display = 'none';
    }, 3000);
}

function actualizarEstadisticas() {
    const totalLibros = Object.keys(estado.libros).length;
    const totalRegistros = maestroRegistros.filter(r => r.tipo === "Registro").length;
    document.getElementById('statLibros').textContent = totalLibros;
    document.getElementById('statRegistros').textContent = totalRegistros;
    document.getElementById('statTotal').textContent = maestroRegistros.length;
}

function setupEventListeners() {
    document.getElementById('searchInput').addEventListener('input', (e) => {
        estado.busqueda = e.target.value.toLowerCase();
        renderizarArbol();
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            estado.filtro = tab.dataset.filter;
            renderizarArbol();
        });
    });
}

// Inicialización
document.addEventListener('DOMContentLoaded', () => {
    initApprovalDB();
    if (!checkApprovalMode()) {
        init();
    }
});

function init() {
    renderizarArbol();
    actualizarEstadisticas();
    setupEventListeners();
}
</script>
</body>
</html>
